name: Data Sync Pipeline

# Tự động refresh data + prediction lên cloud DB — KHÔNG cần Docker Desktop local.
# WHO FluNet publish thứ Hai -> chạy 05:00 UTC thứ Hai (12:00 ICT) sau khi WHO cập nhật.
#
# Pipeline 4 bước (giống scheduler_worker.py trong Docker):
#   1. sync_flunet     — pull WHO FluNet 2024+
#   2. sync_weather    — Open-Meteo 12 tuần gần nhất
#   3. feature_builder — flu + dengue, năm hiện tại
#   4. batch_predict   — predict tuần mới nhất -> bảng predictions (model v2 + v4)
#
# Cần secret DATABASE_URL. Có thể trigger thủ công qua workflow_dispatch.

on:
  schedule:
    - cron: "0 5 * * 1"   # Thứ Hai 05:00 UTC = 12:00 ICT
  workflow_dispatch:
    inputs:
      weeks_back:
        description: "Số tuần weather sync ngược lại"
        default: "12"

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONPATH: ${{ github.workspace }}/src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/backend/requirements.txt

      - name: Install deps
        run: pip install -r src/backend/requirements.txt

      - name: Sync FluNet (WHO)
        run: python src/scripts/sync_flunet.py --from-year 2024 --trigger scheduled

      - name: Sync weather (Open-Meteo)
        run: python src/scripts/sync_weather.py --weeks-back "${{ github.event.inputs.weeks_back || '12' }}" --trigger scheduled

      - name: Build features (flu)
        run: python src/scripts/feature_builder.py --disease flu --from-year "$(date +%Y)" --trigger scheduled

      - name: Build features (dengue)
        run: python src/scripts/feature_builder.py --disease dengue --from-year "$(date +%Y)" --trigger scheduled

      - name: Batch predict (model v2 regressor + v4 classifier)
        run: python src/scripts/batch_predict.py --trigger scheduled

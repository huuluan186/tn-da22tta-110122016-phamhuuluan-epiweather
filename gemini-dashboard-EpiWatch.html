<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EpiWatch · Global Risk Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/world.js"></script>

    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1f2e;
            --surface-2: #141926;
            --surface-3: #222837;
            --border: #2a3040;
            --border-soft: #232838;
            --text-1: #f1f5f9;
            --text-2: #94a3b8;
            --text-3: #64748b;

            --influenza: #3b82f6;
            --dengue: #f59e0b;
            --rsv: #10b981;
            --parainfluenza: #8b5cf6;

            --risk-low: #22c55e;
            --risk-med: #f59e0b;
            --risk-high: #ef4444;
            --risk-crit: #dc2626;
            --risk-none: #2a3040;

            --pulse: #22c55e;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-1);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
        }

        .app {
            display: grid;
            grid-template-rows: 56px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 32px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .brand-mark {
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 6px;
            display: grid;
            place-items: center;
            position: relative;
        }

        .brand-mark::after {
            content: "";
            position: absolute;
            inset: 6px;
            border: 1.5px solid #f1f5f9;
            border-radius: 2px;
            border-bottom: none;
            border-right: none;
            border-top-left-radius: 50%;
        }

        .nav-links {
            display: flex;
            gap: 2px;
        }

        .nav-link {
            padding: 8px 14px;
            border-radius: 6px;
            color: var(--text-2);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background .12s, color .12s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text-1);
            background: var(--surface-3);
        }

        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .week-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            font-feature-settings: 'tnum';
        }

        .week-indicator .week-label {
            color: var(--text-3);
        }

        .week-indicator .week-value {
            color: var(--text-1);
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--pulse);
            position: relative;
        }

        .pulse::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--pulse);
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: .7;
            }

            100% {
                transform: scale(2.6);
                opacity: 0;
            }
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 6px;
            color: var(--text-2);
            cursor: pointer;
        }

        .icon-btn:hover {
            background: var(--surface-3);
            color: var(--text-1);
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: grid;
            place-items: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .main {
            display: grid;
            grid-template-columns: 280px 1fr 380px;
            overflow: hidden;
            height: 100%;
        }

        .sidebar {
            border-right: 1px solid var(--border);
            background: var(--surface);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .side-section {
            padding: 16px 16px;
            border-bottom: 1px solid var(--border-soft);
        }

        .side-section:last-child {
            border-bottom: none;
        }

        .side-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--text-3);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .disease-tabs {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .disease-tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-2);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            text-align: left;
            transition: background .1s, color .1s, border-color .1s;
        }

        .disease-tab:hover,
        .disease-tab.active {
            background: var(--surface-3);
            color: var(--text-1);
        }

        .disease-tab.active {
            border-color: var(--border);
        }

        .disease-tab .swatch {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .disease-tab .tab-name {
            flex: 1;
        }

        .disease-tab .tab-count {
            font-size: 11px;
            color: var(--text-3);
            font-feature-settings: 'tnum';
        }

        .disease-tab.active .tab-count {
            color: var(--text-2);
        }

        .week-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .week-stepper {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            cursor: pointer;
        }

        .week-stepper:hover {
            color: var(--text-1);
            border-color: var(--text-3);
        }

        .week-display {
            flex: 1;
            height: 32px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-card {
            padding: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            border-radius: 6px;
        }

        .stat-card.full {
            grid-column: 1 / -1;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-3);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
        }

        .map-wrap {
            position: relative;
            background: var(--bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            z-index: 3;
            pointer-events: none;
        }

        .map-header>* {
            pointer-events: auto;
        }

        .map-title h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
        }

        .map-title p {
            margin: 2px 0 0;
            font-size: 12px;
            color: var(--text-2);
        }

        .echarts-map-container {
            width: 100%;
            height: 100%;
        }

        .legend {
            position: absolute;
            bottom: 16px;
            left: 20px;
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 11px;
            z-index: 3;
        }

        .legend-label {
            color: var(--text-3);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-2);
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .alerts {
            border-left: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .alerts-head {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .alerts-head h3 {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            gap: 8px;
        }

        .alerts-head .count {
            background: var(--surface-3);
            color: var(--text-1);
            font-size: 11px;
            padding: 1px 7px;
            border-radius: 10px;
        }

        .alerts-list {
            flex: 1;
            overflow-y: auto;
        }

        .alert {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-soft);
            cursor: pointer;
        }

        .alert:hover {
            background: var(--surface-2);
        }

        .alert-row1 {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-country {
            font-weight: 600;
            font-size: 13px;
        }

        .alert-meta {
            margin-left: auto;
            font-size: 10px;
            color: var(--text-3);
        }

        .alert-row2 {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .disease-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 3px;
        }

        .risk-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 3px;
            color: white;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--surface-3);
        }

        /* ── WEEK PICKER ADDITIONS ── */
        .year-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .year-select {
            flex: 1;
            height: 30px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-1);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            padding: 0 8px;
            cursor: pointer;
            appearance: none;
            text-align: center;
        }

        .year-select:focus {
            outline: none;
            border-color: var(--text-3);
        }

        .week-track {
            margin-top: 8px;
            height: 4px;
            background: var(--surface-2);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .week-track-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            border-radius: 2px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.2s ease;
        }

        .week-meta {
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-3);
            font-feature-settings: 'tnum';
        }

        /* ── WHO REGION FILTER ── */
        .region-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .region-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            cursor: pointer;
            border-radius: 4px;
            color: var(--text-2);
            font-size: 12px;
            user-select: none;
        }

        .region-row:hover {
            color: var(--text-1);
            background: var(--surface-3);
        }

        .region-check {
            width: 14px;
            height: 14px;
            border: 1.5px solid var(--border);
            border-radius: 3px;
            display: grid;
            place-items: center;
            background: var(--surface-2);
            flex-shrink: 0;
            transition: background 0.1s, border-color 0.1s;
        }

        .region-row.on .region-check {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .region-row.on {
            color: var(--text-1);
        }

        .region-count {
            margin-left: auto;
            color: var(--text-3);
            font-size: 11px;
            font-feature-settings: 'tnum';
        }

        /* ── SUMMARY STATS ── */
        .stat-delta {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            margin-top: 2px;
            font-size: 11px;
            font-weight: 500;
            font-feature-settings: 'tnum';
        }

        .stat-delta.up {
            color: var(--risk-high);
        }

        .stat-delta.down {
            color: var(--risk-low);
        }

        .stat-delta.flat {
            color: var(--text-3);
        }

        /* ── ALERTS SIDEBAR UPGRADES ── */
        .alerts-filter-bar {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-soft);
            background: var(--surface-2);
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .af-select {
            height: 26px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-1);
            font-family: inherit;
            font-size: 11px;
            padding: 0 6px;
            cursor: pointer;
            flex: 1;
            min-width: 80px;
        }

        .af-select:focus {
            outline: none;
            border-color: var(--text-3);
        }

        .af-label {
            font-size: 10px;
            color: var(--text-3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            white-space: nowrap;
        }

        .alert-flag {
            width: 20px;
            height: 14px;
            flex-shrink: 0;
            border-radius: 2px;
            background: var(--surface-3);
            font-size: 9px;
            display: grid;
            place-items: center;
            color: var(--text-3);
            font-weight: 600;
            letter-spacing: .04em;
        }

        .alert-region {
            font-size: 11px;
            color: var(--text-3);
        }

        .alert-row3 {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-2);
            font-feature-settings: 'tnum';
        }

        .delta-up {
            color: var(--risk-high);
            font-weight: 600;
        }

        .delta-down {
            color: var(--risk-low);
            font-weight: 600;
        }

        .sparkline {
            height: 22px;
            width: 72px;
            margin-left: auto;
        }

        /* NEW: ANALYTICS DASHBOARD */
        .analytics-wrapper {
            grid-column: 1 / -1;
            background: var(--bg);
            overflow-y: auto;
            padding: 24px;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .an-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .an-card.full {
            grid-column: 1 / -1;
        }

        .an-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .an-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .an-subtitle {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 4px;
        }

        .an-chart-container {
            flex: 1;
            min-height: 300px;
            width: 100%;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 10px;
        }

        .forecast-col {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border-top: 3px solid transparent;
        }

        .forecast-wk {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 8px;
        }

        .forecast-val {
            font-size: 28px;
            font-weight: 700;
            font-feature-settings: "tnum";
            margin-bottom: 8px;
        }

        .placeholder {
            grid-column: 1 / -1;
            display: grid;
            place-items: center;
            background: var(--bg);
            padding: 40px;
            overflow-y: auto;
        }

        .placeholder-card {
            max-width: 580px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
        }

        .placeholder-card h1 {
            margin-bottom: 12px;
            font-size: 24px;
            color: var(--text-1);
        }

        .placeholder-card p {
            color: var(--text-2);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const DISEASES = [
            { id: 'influenza', label: 'Influenza', color: '#3b82f6', short: 'FLU' },

        const RISK_LEVELS = {

            ARG: 'AMRO', BRA: 'AMRO', CAN: 'AMRO', CHL: 'AMRO', COL: 'AMRO', CUB: 'AMRO', MEX: 'AMRO', PER: 'AMRO', USA: 'AMRO', VEN: 'AMRO',
            AFG: 'EMRO', EGY: 'EMRO', IRN: 'EMRO', IRQ: 'EMRO', MAR: 'EMRO', PAK: 'EMRO', SAU: 'EMRO', SYR: 'EMRO',
            BGD: 'SEARO', IDN: 'SEARO', IND: 'SEARO', MMR: 'SEARO', THA: 'SEARO',
            AUS: 'WPRO', CHN: 'WPRO', JPN: 'WPRO', KOR: 'WPRO', MYS: 'WPRO', PHL: 'WPRO', VNM: 'WPRO',
            ZAF: 'AFRO', NGA: 'AFRO', KEN: 'AFRO', ETH: 'AFRO', COD: 'AFRO'
        };

        const ECHARTS_COUNTRY_NAMES = {
            'USA': 'United States', 'CHN': 'China', 'IND': 'India', 'BRA': 'Brazil', 'RUS': 'Russia',
            'AUS': 'Australia', 'CAN': 'Canada', 'FRA': 'France', 'DEU': 'Germany', 'GBR': 'United Kingdom',

            'PER': 'Peru', 'PHL': 'Philippines', 'NGA': 'Nigeria', 'ESP': 'Spain', 'ITA': 'Italy',
            'COL': 'Colombia', 'ARG': 'Argentina', 'EGY': 'Egypt', 'IRN': 'Iran', 'TUR': 'Turkey',
            'THA': 'Thailand', 'KOR': 'Korea', 'SAU': 'Saudi Arabia', 'POL': 'Poland', 'PAK': 'Pakistan',
            'BGD': 'Bangladesh', 'SWE': 'Sweden', 'NOR': 'Norway', 'FIN': 'Finland', 'UKR': 'Ukraine',
            'KEN': 'Kenya', 'ETH': 'Ethiopia', 'COD': 'Dem. Rep. Congo', 'MAR': 'Morocco'
        };

        function hash(str) {
            let h = 2166136261;
            for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
            return ((h >>> 0) / 4294967296);
        }

        function diseaseProfile(iso3, diseaseId, week) {
            const region = COUNTRY_REGION[iso3] || 'EURO';
            let base = 30;
            const sin = (cycle, shift) => Math.sin(((week + shift) / 52) * Math.PI * 2 * cycle);

            if (diseaseId === 'influenza') base = 30 + (['EURO', 'AMRO'].includes(region) ? sin(1, -2) * 30 : sin(1, 24) * 25);
            else if (diseaseId === 'dengue') base = 35 + sin(1, 10) * 25;
            else if (diseaseId === 'rsv') base = 28 + sin(1, -4) * 32;
            else base = 30 + sin(2, 0) * 18;

            const noise = (hash(iso3 + diseaseId + week) - 0.5) * 35;
            const score = Math.max(0, Math.min(100, base + noise));

            let risk;
            if (score < 20) risk = 'low'; else if (score < 45) risk = 'medium'; else if (score < 70) risk = 'high'; else risk = 'critical';

            return { iso3, score: Math.round(score), risk };
        }

        /* ── Sparkline SVG ── */
        function Sparkline({ data, color }) {
            if (!data || !data.length) return null;
            const w = 72, h = 22, pad = 2;
            const max = Math.max(...data), min = Math.min(...data);
            const range = Math.max(1, max - min);
            const pts = data.map((v, i) => [
                pad + (i / (data.length - 1)) * (w - pad * 2),
                pad + (1 - (v - min) / range) * (h - pad * 2)
            ]);
            const path = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
            const area = path + ` L${pts[pts.length - 1][0]},${h} L${pts[0][0]},${h} Z`;
            return (
                <svg className="sparkline" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
                    <path d={area} fill={color} fillOpacity="0.15" />
                    <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                    <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="2" fill={color} />
                </svg>
            );
        }

            const [filterDisease, setFilterDisease] = useState('all');
            const [filterRisk, setFilterRisk] = useState('all');
            const [sortBy, setSortBy] = useState('risk');

            const filtered = useMemo(() => {
                let list = ALERT_COUNTRIES.map(item => ({
                    ...item,
                    profile: diseaseProfile(item.iso3, item.disease, week),
                }));
                if (filterDisease !== 'all') list = list.filter(a => a.disease === filterDisease);
                if (filterRisk !== 'all') list = list.filter(a => a.profile.risk === filterRisk);
                if (sortBy === 'risk') list.sort((a, b) => RISK_ORDER[b.profile.risk] - RISK_ORDER[a.profile.risk]);
                else if (sortBy === 'score') list.sort((a, b) => b.profile.score - a.profile.score);
                else if (sortBy === 'name') list.sort((a, b) => a.name.localeCompare(b.name));
                return list;
            }, [week, filterDisease, filterRisk, sortBy]);

            return (
                <aside className="alerts">
                    <div className="alerts-head">
                        <h3>Active Alerts <span className="count">{filtered.length}</span></h3>
                    </div>

                    {/* Filter + Sort bar */}
                    <div className="alerts-filter-bar">
                        <span className="af-label">Disease</span>
                        <select className="af-select" value={filterDisease} onChange={e => setFilterDisease(e.target.value)}>
                            <option value="all">All</option>
                            {DISEASES.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
                        </select>
                    </div>
                    <div className="alerts-filter-bar">
                        <span className="af-label">Risk</span>
                        <select className="af-select" value={filterRisk} onChange={e => setFilterRisk(e.target.value)}>
                            <option value="all">All levels</option>
                            <option value="critical">Critical</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <span className="af-label" style={{ marginLeft: 4 }}>Sort</span>
                        <select className="af-select" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                            <option value="risk">By Risk</option>
                            <option value="score">By Score</option>
                            <option value="name">By Name</option>
                        </select>
                    </div>

                    <div className="alerts-list">
                        {filtered.length === 0 && (
                            <div style={{ padding: 24, textAlign: 'center', color: 'var(--text-3)', fontSize: 12 }}>
                                No alerts match the current filters.
                            </div>
                        )}
                        {filtered.map((item, i) => (
                            <AlertItem key={i} item={item} week={week} />
                        ))}
                    </div>
                </aside>
            );
        }

        /* ── App ── */
        function App() {
            const [route, setRoute] = useState('Risk Map');
            const [disease, setDisease] = useState('influenza');
            const [week, setWeek] = useState(19);
            const [year, setYear] = useState(2026);
            const [regions, setRegions] = useState([]);

            const toggleRegion = (id) => setRegions(r => r.includes(id) ? r.filter(x => x !== id) : [...r, id]);
            const years = Array.from({ length: 17 }, (_, i) => 2010 + i); // 2010–2026
            const weekPct = (week / 52 * 100).toFixed(1);

            const activeDiseaseObj = DISEASES.find(d => d.id === disease);

            return (
                <div className="app">
                    <header className="nav">
                        <div className="brand"><div className="brand-mark"></div>EpiWatch</div>
                        <nav className="nav-links">
                            {['Risk Map', 'Analytics', 'Country Detail'].map(t => (
                                <a key={t} className={`nav-link ${t === route ? 'active' : ''}`} onClick={() => setRoute(t)}>{t}</a>
                            ))}
                        </nav>
                        <div className="nav-right">
                            <div className="week-indicator">
                                <PulseDot />
                                <span className="week-label">LIVE</span>
                                <span className="week-value">W{String(week).padStart(2, '0')} · {year}</span>
                            </div>
                            <div className="icon-btn"><Icon name="search" /></div>
                            <div className="avatar">DR</div>
                        </div>
                    </header>

                    {route === 'Risk Map' && (
                        <div className="main">
                            {/* ── LEFT SIDEBAR ── */}
                            <aside className="sidebar">
                                {/* Disease */}
                                <div className="side-section">
                                    <div className="side-label">Disease</div>
                                    <div className="disease-tabs">
                                        {DISEASES.map(d => (
                                            <button key={d.id} className={`disease-tab ${disease === d.id ? 'active' : ''}`} onClick={() => setDisease(d.id)}>
                                                <span className="swatch" style={{ background: d.color }}></span>
                                                <span className="tab-name">{d.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Reporting Week — với year selector + progress bar */}
                                <div className="side-section">
                                    <div className="side-label">Reporting Week</div>
                                    {/* Year selector */}
                                    <div className="year-row">
                                        <select
                                            className="year-select"
                                            value={year}
                                            onChange={e => setYear(Number(e.target.value))}
                                        >
                                            {years.map(y => <option key={y} value={y}>{y}</option>)}
                                        </select>
                                    </div>
                                    {/* Week stepper */}
                                    <div className="week-row">
                                        <button className="week-stepper" onClick={() => setWeek(Math.max(1, week - 1))}>
                                            <Icon name="chevron-left" size={14} />
                                        </button>
                                        <div className="week-display">W{String(week).padStart(2, '0')}</div>
                                        <button className="week-stepper" onClick={() => setWeek(Math.min(52, week + 1))}>
                                            <Icon name="chevron-right" size={14} />
                                        </button>
                                    </div>
                                    {/* Progress bar */}
                                    <div className="week-track">
                                        <div className="week-track-fill" style={{ width: weekPct + '%' }} />
                                    </div>
                                    <div className="week-meta">
                                        <span>W01</span>
                                        <span>W{String(week).padStart(2, '0')} / 52</span>
                                        <span>W52</span>
                                    </div>
                                </div>

                                {/* WHO Region */}
                                <div className="side-section">
                                    <div className="side-label">WHO Region</div>
                                    <RegionFilter
                                        value={regions}
                                        onToggle={toggleRegion}
                                        disease={disease}
                                        week={week}
                                    />
                                </div>

                                {/* Summary Stats */}
                                <div className="side-section" style={{ flex: 1 }}>
                                    <div className="side-label">Summary · {activeDiseaseObj.label}</div>
                                    <SummaryStats disease={disease} week={week} />
                                </div>
                            </aside>

                            {/* ── MAP ── */}
                            <div className="map-wrap">
                                <div className="map-header">
                                    <div className="map-title">
                                        <h2>Global Risk Map · {activeDiseaseObj.label}</h2>
                                        <p>W{String(week).padStart(2, '0')} · {year}{regions.length ? ` · ${regions.join(', ')}` : ''}</p>
                                    </div>
                                </div>
                                <EChartsWorldMap disease={disease} week={week} year={year} onCountrySelect={() => setRoute('Country Detail')} />
                                <div className="legend">
                                    <span className="legend-label">Risk</span>
                                    {Object.values(RISK_LEVELS).reverse().map((r, i) => (
                                        <div key={i} className="legend-item">
                                            <div className="legend-swatch" style={{ background: r.color }} />
                                            {r.label}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* ── RIGHT SIDEBAR — upgraded alerts ── */}
                            <AlertsSidebar week={week} />
                        </div>
                    )}

                    {route === 'Analytics' && <AnalyticsDashboard disease={disease} />}

                    {route === 'Country Detail' && (
                        <div className="placeholder">
                            <div className="placeholder-card">
                                <h1>Country Detail View</h1>
                                <p>Select a country on the map or navigate via the side panel to populate this view.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>

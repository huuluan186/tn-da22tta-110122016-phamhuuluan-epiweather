services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-epiweather}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-kltn_epiweather}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-epiweather} -d ${DB_NAME:-kltn_epiweather}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-epiweather}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-kltn_epiweather}
      MODELS_DIR: /app/ml_models
      DEBUG: ${DEBUG:-false}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    volumes:
      - ./ml_models:/app/ml_models:ro
    ports:
      - "8000:8000"

